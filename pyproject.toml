[build-system]
requires = ["setuptools>=61.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "uchi_python"
version = "0.1.0"
description = "Online credibility-weighted sequence predictor for tabular, time series, and generative ML"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
keywords = [
    "machine learning", "online learning", "sequence prediction",
    "time series", "concept drift", "trie", "CTW",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

# Pure Python — no required dependencies.
# Optional extras unlock sklearn integration and numpy/pandas input handling.
dependencies = []

[project.optional-dependencies]
sklearn = ["scikit-learn>=1.0"]
numpy   = ["numpy>=1.20"]
pandas  = ["pandas>=1.3"]
pyspark = ["pyspark>=3.0.0"]
optuna  = ["optuna>=3.0.0"]
all     = ["scikit-learn>=1.0", "numpy>=1.20", "pandas>=1.3", "pyspark>=3.0.0", "optuna>=3.0.0"]

[tool.setuptools.packages.find]
where   = ["."]
include = ["uchi*"]

[tool.setuptools.package-data]
uchi = ["py.typed"]
