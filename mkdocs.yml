site_name: Uchi Documentation
site_url: https://github.com/JosephWoodall/uchi
repo_url: https://github.com/JosephWoodall/uchi
repo_name: JosephWoodall/uchi

theme:
  name: material
  logo: docs/logo.png
  favicon: docs/logo.png
  palette:
    - scheme: slate
      primary: cyan
      accent: deep purple

nav:
  - Home: index.md
  - Python API: python-api.md
  - Architecture: architecture.md
  - Generate-and-Ground: generate-and-ground.md
  - Reasoning: reasoning.md
  - Benchmarks: benchmarks.md
  - Skills:
    - Multi-Modal Router: omni-router.md
    - Core Engine (Trie): core-engine.md
    - Tabular Models: tabular.md
    - Time Series Models: timeseries.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - tables
