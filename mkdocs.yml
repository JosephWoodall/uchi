site_name: Uchi Documentation
site_url: https://github.com/JosephWoodall/uchi
repo_url: https://github.com/JosephWoodall/uchi
repo_name: JosephWoodall/uchi

theme:
  name: material
  logo: docs/logo.png
  favicon: docs/logo.png
  palette:
    - scheme: slate
      primary: cyan
      accent: deep purple

nav:
  - Home: index.md
  - API Reference:
    - Core Engine: core-engine.md
    - Tabular Models: tabular.md
    - Time Series Models: timeseries.md
    - Generative Models: generative.md
    - Simulation Engine (v0.2.0): simulation-engine.md
  - Benchmarks: benchmarks.md
  - Architecture: architecture.md
  - Contributing: CONTRIBUTING.md
  - Changelog: CHANGELOG.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - tables
